<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>HOWHOTISIT</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/vendor/uPlot.min.css">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header>
    <h1><img class="logo" src="/favicon.svg" alt="" width="22" height="22">HOWHOTISIT</h1>
    <button id="add-btn">+ Add machine</button>
  </header>

  <main>
    <section id="chart-wrap">
      <div id="chart"></div>
    </section>

    <section id="side">
      <div class="tabs" role="tablist">
        <button class="tab active" data-tab="machines" role="tab" aria-selected="true">Machines</button>
        <button class="tab" data-tab="alerts" role="tab" aria-selected="false">Alerts</button>
      </div>

      <div id="tab-machines" class="tab-panel" role="tabpanel">
        <div class="table-scroll">
          <table id="machines">
            <tbody></tbody>
          </table>
        </div>
      </div>

      <div id="tab-alerts" class="tab-panel" role="tabpanel" hidden>
        <div class="table-scroll">
          <table id="alerts">
            <thead>
              <tr><th>Time</th><th>Machine</th><th>Event</th><th>Temp</th></tr>
            </thead>
            <tbody></tbody>
          </table>
        </div>
      </div>
    </section>
  </main>

  <dialog id="add-dialog">
    <form method="dialog" id="add-form">
      <h2>Add machine</h2>
      <label>Name <input id="machine-name" required autocomplete="off"></label>
      <div class="dialog-actions">
        <button value="cancel" type="button" id="add-cancel">Cancel</button>
        <button value="ok" id="add-ok">Create</button>
      </div>
    </form>
    <div id="enroll-result" hidden>
      <h2>Machine created ✅</h2>

      <p class="step">1. Paste these into the config block at the top of <code>agent.sh</code>:</p>
      <pre id="enroll-env"></pre>
      <button class="secondary" data-copy="enroll-env">Copy env</button>

      <p class="step">2. Add these cron entries (reports every 30s):</p>
      <pre id="enroll-cron"></pre>
      <button class="secondary" data-copy="enroll-cron">Copy cron</button>

      <div class="dialog-actions">
        <button id="enroll-close">Done</button>
      </div>
    </div>
  </dialog>

  <dialog id="confirm-dialog">
    <h2>Delete machine?</h2>
    <p id="confirm-msg"></p>
    <div class="dialog-actions">
      <button class="secondary" type="button" id="confirm-cancel">Cancel</button>
      <button class="danger" type="button" id="confirm-ok">Delete</button>
    </div>
  </dialog>

  <script src="/vendor/uPlot.iife.min.js"></script>
  <script src="/app.js"></script>
</body>
</html>
